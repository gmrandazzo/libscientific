name: Build, Analyze, and SonarQube Integration

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build_and_analyze:
    name: SonarQube Analysis (C & Python)
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get -y install \
            build-essential cmake liblapack-dev libsqlite3-dev gcovr tox curl unzip

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download Build Wrapper from Server
        run: |
          curl -sSLo build-wrapper.zip ${{ secrets.SONAR_HOST_URL }}/static/cpp/build-wrapper-linux-x86.zip
          unzip -o build-wrapper.zip
          echo "$(pwd)/build-wrapper-linux-x86" >> $GITHUB_PATH

      - name: Configure CMake
        # Added -DENABLE_COVERAGE=ON assuming your CMakeLists uses it for gcov
        run: cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=TRUE -DCMAKE_BUILD_TYPE=Debug -DENABLE_COVERAGE=ON .

      - name: Build C Library with Build-Wrapper
        run: |
          build-wrapper-linux-x86-64 --out-dir bw-output cmake --build build --parallel $(nproc)
          sudo cmake --install build

      - name: Run C Tests
        run: |
          cd build && ctest --output-on-failure

      - name: Generate C Coverage Report
        run: |
          # Generates a generic coverage XML file for SonarQube using gcovr
          gcovr -r . --sonarqube coverage-c.xml

      - name: Run Python Tests and Coverage (tox)
        run: |
          cd src/python_bindings
          tox -e py
          # Adjust paths in the Python coverage report for SonarQube
          sed -i -e 's/<source>libscientific<\/source>/<source>src\/python_bindings\/libscientific<\/source>/' coverage.xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.cfamily.build-wrapper-output=bw-output
            -Dsonar.coverageReportPaths=coverage-c.xml
            -Dsonar.python.coverage.reportPaths=src/python_bindings/coverage.xml
            -Dsonar.verbose=true
